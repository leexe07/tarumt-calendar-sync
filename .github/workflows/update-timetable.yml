name: Update Timetable Daily

on:
  schedule:
    # Run every day at 6:00 AM Malaysia Time (UTC+8, which is 22:00 UTC previous day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual trigger
  
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-timetable:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set timezone
        run: sudo timedatectl set-timezone Asia/Kuala_Lumpur
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Generate timetable
        env:
          TARUMT_USERNAME: ${{ secrets.TARUMT_USERNAME }}
          TARUMT_PASSWORD: ${{ secrets.TARUMT_PASSWORD }}
          APP_SECRET: 3f8a7c12d9e54b88b6a2f4d915c3e7a1
        run: node generateTimetable.js
        continue-on-error: true
        
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update timetable [skip ci]"
            git push
          fi
