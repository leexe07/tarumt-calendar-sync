name: Update Timetable Daily

on:
  schedule:
    # Run every day at 6:00 AM Malaysia Time (UTC+8, which is 22:00 UTC previous day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual trigger
  
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-timetable:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set timezone
        run: sudo timedatectl set-timezone Asia/Kuala_Lumpur
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      # ========================================================
      # STEP 1 PLACEMENT: Add the Puppeteer dependencies here!
      # ========================================================
      - name: Install System Dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg
          
      - name: Install dependencies
        run: npm install
        
      - name: Generate timetable
        env:
          TARUMT_USERNAME: ${{ secrets.TARUMT_USERNAME }}
          TARUMT_PASSWORD: ${{ secrets.TARUMT_PASSWORD }}
        run: node generateTimetable.js
        # Notice we removed continue-on-error and APP_SECRET here

      # ========================================================
      # Your original commit step containing 'fi' remains at the very end:
      # ========================================================
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update timetable [skip ci]"
            git push
          fi
